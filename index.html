<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub ₹100</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 5px; }
        p { color: #5f6368; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; text-decoration: none; display: inline-block; }
        .btn:hover { background: #174ea6; }
        .qr-img { width: 220px; height: 220px; margin-top: 20px; border: 8px solid #f8f9fa; border-radius: 10px; }
        .wa-btn { background: #25d366; margin-top: 15px; }
        .pay-now-btn { background: #ff9900; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card" id="app-box">
    <h2>🚀 Marketing Hub</h2>
    <p>Join karein ₹100 mein aur kamayi shuru karein!</p>
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <form id="joinForm">
        <input type="text" name="name" placeholder="Aapka Poora Naam" required>
        <input type="tel" name="mobile" placeholder="WhatsApp Number" required>
        <input type="text" name="referral" placeholder="Referral Code (Optional)">
        <button type="submit" class="btn" id="submitBtn">Register & Pay ₹100</button>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz9-rUmji4UB-wMUH7WgTsJ3lfp73JRfnTQbQu1pDgmIcPIo479nSyyw_cIM1G7OumqMQ/exec'; 
    const myUPI = "6397969337@ptyes";
    const myWhatsApp = "916397969337";

    const form = document.getElementById('joinForm');
    const box = document.getElementById('app-box');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Data Save Ho Raha Hai...";
        btn.disabled = true;

        const userName = form.name.value;
        const upiLink = `upi://pay?pa=${myUPI}&pn=MarketingHub&am=100&cu=INR&tn=MKT_Registration`;

        // Background mein data save ho raha hai
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
        .then(response => {
            // Payment Page dikhayein
            box.innerHTML = `
                <h2 style="color:#25d366;">Data Saved! ✅</h2>
                <p>Namaste <b>${userName}</b>, ₹100 pay karein.</p>
                
                <a href="${upiLink}" class="btn pay-now-btn">PhonePe / Paytm se Pay Karein</a>
                
                <p>Ya QR Code scan karein:</p>
                <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(upiLink)}" alt="QR Code">
                
                <p><strong>Payment ke baad screenshot WhatsApp karein:</strong></p>
                <a href="https://wa.me/${myWhatsApp}?text=Hi Punit, maine ₹100 pay kar diye hain. Naam: ${userName}" class="btn wa-btn">WhatsApp Screenshot</a>
                <p style="font-size:12px; margin-top:10px;">Aapki ID 30 min mein active ho jayegi.</p>
            `;
        })
        .catch(error => {
            alert('Error! Check internet connection.');
            btn.innerText = "Register & Pay ₹100";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
