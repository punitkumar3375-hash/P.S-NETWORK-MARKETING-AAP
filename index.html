<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub | Punit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; overflow-x: hidden; }
        .hidden-section { display: none !important; }
        .box-active { border: 2px solid #3b82f6; background: #1e293b; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .box-locked { border: 2px solid #1e293b; background: #0f172a; opacity: 0.4; position: relative; }
        .lock-icon { position: absolute; top: 5px; right: 5px; font-size: 10px; color: #64748b; }
        #infoModal { backdrop-filter: blur(8px); }
        .joining-card { background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%); border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen text-white">

    <div id="loginPage" class="max-w-md w-full bg-slate-800 rounded-[2.5rem] p-10 shadow-2xl border border-slate-700 text-center mt-10">
        <h1 class="text-4xl font-black italic text-blue-500 mb-8 uppercase tracking-tighter">Marketing Hub</h1>
        <input id="mobileInput" type="number" placeholder="Mobile Number" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl px-5 py-4 text-center text-lg outline-none focus:border-blue-500 mb-4 text-white">
        <button id="loginBtn" onclick="checkStatus()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black shadow-lg transition-all active:scale-95 text-white text-white text-white">LOGIN</button>
    </div>

    <div id="regPage" class="hidden-section max-w-md w-full bg-slate-800 rounded-[2.5rem] p-8 shadow-2xl border border-slate-700 text-center text-white">
        <h2 class="text-xl font-black mb-6 text-blue-500 uppercase italic">Add New Member</h2>
        <div class="space-y-4">
            <input id="regName" type="text" placeholder="Full Name" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl px-4 py-3 outline-none text-white">
            <input id="regMobile" type="number" placeholder="Mobile Number" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl px-4 py-3 outline-none text-white">
            <p class="text-[10px] text-gray-500 font-bold uppercase text-left ml-1">Joining Plan</p>
            <select id="regLevel" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl px-4 py-3 text-gray-300">
                <option value="100">Plan ₹100</option>
                <option value="200">Plan ₹200</option>
                <option value="500">Plan ₹500</option>
                <option value="1000">Plan ₹1000</option>
                <option value="2000">Plan ₹2000</option>
            </select>
            <button id="regBtn" onclick="submitReg()" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase shadow-lg text-white">Submit Joining</button>
            <button onclick="showDashboard()" class="w-full text-gray-500 text-[10px] font-bold uppercase py-2">Back to Dashboard</button>
        </div>
    </div>

    <div id="dashboardPage" class="hidden-section max-w-md w-full text-white">
        <div class="bg-slate-800 rounded-[2.5rem] p-6 shadow-2xl border border-slate-700 mb-4">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p id="userName" class="text-[10px] text-blue-300 font-bold italic uppercase tracking-widest">---</p>
                    <h2 class="text-xl font-black text-blue-500 italic uppercase">Dashboard</h2>
                </div>
                <button onclick="location.reload()" class="bg-red-600/20 px-3 py-1 rounded-lg text-red-400 font-bold text-[10px] uppercase">Logout</button>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                    <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Total Earning</p>
                    <p id="resTotal" class="text-2xl font-black text-green-400 italic">₹0</p>
                </div>
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                    <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Your Level</p>
                    <p id="activeLvlDisplay" class="text-2xl font-black text-blue-400 italic">₹0</p>
                </div>
            </div>
            
            <div id="boxesContainer" class="grid grid-cols-5 gap-2 mb-6"></div>

            <button onclick="showReg()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase shadow-lg flex items-center justify-center text-white">
                <span class="mr-2 text-xl">+</span> Add New Member
            </button>
        </div>

        <div class="px-2">
            <h3 class="text-sm font-black text-blue-400 uppercase italic mb-4">Your Team</h3>
            <div id="joiningList" class="space-y-3 pb-10"></div>
        </div>
    </div>

    <div id="infoModal" class="hidden-section fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-6 text-white">
        <div class="bg-slate-800 w-full max-w-xs rounded-[2.5rem] p-8 border border-blue-500/50 shadow-2xl text-center relative text-white">
            <h3 id="modalTitle" class="text-2xl font-black text-blue-500 italic mb-4 uppercase text-white">LVL 0</h3>
            <div class="bg-slate-900 p-4 rounded-2xl mb-4 border border-slate-700 text-white">
                <p class="text-gray-400 text-[8px] font-bold uppercase mb-1 tracking-widest text-white">Joins Count</p>
                <p id="modalJoins" class="text-3xl font-black text-white">0</p>
            </div>
            <div id="modalDetails" class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/30 mb-6 space-y-2"></div>
            <button onclick="closeModal()" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase tracking-widest active:scale-95 shadow-lg text-white">CLOSE</button>
        </div>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxkaqO4cP3M8R9mLuC10JZHszVOqKPAL0jDFugCEbCivUu8xYbdzjx1ZpaKWiVXOccD0w/exec";
        let userFullData = null;
        const config = { 100:{base:0.15}, 200:{base:0.20}, 500:{base:0.25}, 1000:{base:0.30}, 2000:{base:0.35} };

        function showReg() { 
            document.getElementById('dashboardPage').classList.add('hidden-section'); 
            document.getElementById('regPage').classList.remove('hidden-section'); 
            const regSelect = document.getElementById('regLevel');
            const myLvl = parseInt(userFullData.activeLevel);
            Array.from(regSelect.options).forEach(opt => {
                if (parseInt(opt.value) > myLvl) {
                    opt.disabled = true;
                    opt.style.color = '#4a5568';
                } else {
                    opt.disabled = false;
                    opt.style.color = 'white';
                }
            });
            regSelect.value = "100";
        }
        
        function showDashboard() { 
            document.getElementById('regPage').classList.add('hidden-section'); 
            document.getElementById('dashboardPage').classList.remove('hidden-section'); 
        }

        function closeModal() { document.getElementById('infoModal').classList.add('hidden-section'); }

        function checkStatus() {
            const mobile = document.getElementById('mobileInput').value;
            if(!mobile) return alert("Number daalo!");
            document.getElementById('loginBtn').innerText = "Loading...";
            fetch(webAppUrl + "?mobile=" + mobile).then(res => res.json()).then(data => {
                if(data.status === "success") {
                    userFullData = data;
                    updateDashboard(data);
                    document.getElementById('loginPage').classList.add('hidden-section');
                    document.getElementById('dashboardPage').classList.remove('hidden-section');
                } else { alert("Account Active nahi hai!"); }
                document.getElementById('loginBtn').innerText = "LOGIN";
            });
        }

        function calculateLevelEarn(lvl, count) {
            const conf = config[lvl];
            let earn = 0, html = "", bP = conf.base * 100;
            if (count >= 1) { let t=conf.base+0.05; earn+=lvl*t; html+=`<div class="flex justify-between text-[10px] border-b border-slate-700 pb-1 mb-1 font-bold"><div class="text-left text-blue-400">1st Join (Base ${bP}%+5%)</div><span>₹${lvl*t}</span></div>`; }
            if (count >= 2) { let t=conf.base+0.10; earn+=lvl*t; html+=`<div class="flex justify-between text-[10px] border-b border-slate-700 pb-1 mb-1 font-bold"><div class="text-left text-blue-400">2nd Join (Base ${bP}%+10%)</div><span>₹${lvl*t}</span></div>`; }
            if (count >= 3) { let t=conf.base+0.15; earn+=lvl*t; html+=`<div class="flex justify-between text-[10px] border-b border-slate-700 pb-1 mb-1 font-bold"><div class="text-left text-blue-400">3rd Join (Base ${bP}%+15%)</div><span>₹${lvl*t}</span></div>`; }
            if (count > 3) { let b=(count-3)*(lvl*conf.base); earn+=b; html+=`<div class="flex justify-between text-[10px] pt-1 font-bold"><div class="text-left text-blue-400">Next ${count-3} (Base ${bP}%)</div><span>₹${Math.floor(b)}</span></div>`; }
            return { total: earn, html: html };
        }

        function updateDashboard(data) {
            document.getElementById('userName').innerText = data.name;
            document.getElementById('activeLvlDisplay').innerText = "₹" + data.activeLevel;
            let totalEarn = 0, totalJoins = 0, html = "", listHtml = "";

            [100, 200, 500, 1000, 2000].forEach(lvl => {
                const count = parseInt(data['count' + lvl]) || 0;
                totalJoins += count;
                const res = calculateLevelEarn(lvl, count);
                totalEarn += res.total;
                
                let myLvl = parseInt(data.activeLevel);
                let isLocked = (lvl > myLvl);
                let activeClass = isLocked ? 'box-locked' : 'box-active';
                let lockStatus = isLocked ? '<span class="lock-icon">🔒</span>' : '';
                let label = isLocked ? 'LOCKED' : 'Joins';

                html += `
                <div onclick="${isLocked ? '' : 'openModal('+lvl+')'}" class="p-2 rounded-2xl text-center min-h-[90px] flex flex-col justify-center transition-all ${activeClass}">
                    ${lockStatus}
                    <p class="text-[8px] font-black text-gray-400 uppercase">LVL ${lvl}</p>
                    <p class="text-white font-black text-lg leading-none my-1">${count}</p>
                    <p class="text-[6px] text-blue-400 font-bold uppercase tracking-widest">${label}</p>
                </div>`;
                
                for(let i=1; i<=count; i++) {
                    listHtml += `<div class="joining-card p-4 rounded-2xl flex justify-between items-center mb-3"><div><p class="text-white font-bold text-sm">Member #${i}</p><p class="text-[9px] text-gray-500 font-black uppercase tracking-widest">Plan ₹${lvl}</p></div><span class="text-green-400 font-black text-[10px]">SUCCESS</span></div>`;
                }
            });

            let bonus = (totalJoins>=30)?1000:(totalJoins>=25)?800:(totalJoins>=20)?600:(totalJoins>=15)?400:(totalJoins>=10)?200:0;
            document.getElementById('boxesContainer').innerHTML = html;
            document.getElementById('resTotal').innerText = "₹" + Math.floor(totalEarn + bonus);
            document.getElementById('joiningList').innerHTML = listHtml || "<p class='text-center text-gray-600 text-xs py-10 italic uppercase'>No joinings yet!</p>";
        }

        function openModal(lvl) {
            const count = parseInt(userFullData['count' + lvl]) || 0;
            const res = calculateLevelEarn(lvl, count);
            document.getElementById('modalTitle').innerText = "Level ₹" + lvl;
            document.getElementById('modalJoins').innerText = count;
            document.getElementById('modalDetails').innerHTML = res.html + `<div class="mt-4 pt-2 border-t-2 border-blue-500 font-black text-green-400 flex justify-between"><span>TOTAL</span> <span>₹${Math.floor(res.total)}</span></div>`;
            document.getElementById('infoModal').classList.remove('hidden-section');
        }

        function submitReg() {
            const name = document.getElementById('regName').value, mobile = document.getElementById('regMobile').value, level = document.getElementById('regLevel').value;
            if(!name || !mobile) return alert("Details bharo!");
            document.getElementById('regBtn').innerText = "Registering...";
            fetch(webAppUrl, { method: "POST", body: JSON.stringify({name, mobile, level, referrer: userFullData.mobile}) })
            .then(() => { alert("Success! Request Sent."); showDashboard(); });
        }
    </script>
</body>
</html>
