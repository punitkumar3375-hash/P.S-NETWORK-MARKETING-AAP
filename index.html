<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub | Punit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .hidden-section { display: none; }
        .box-active { border: 2px solid #3b82f6; background: #1e293b; box-shadow: 0 0 15px rgba(59,130,246,0.3); }
        .box-locked { border: 2px solid #334155; opacity: 0.6; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div id="loginPage" class="max-w-md w-full bg-slate-800 rounded-[2.5rem] p-10 shadow-2xl border border-slate-700 text-center">
        <h1 class="text-4xl font-black italic text-blue-500 mb-8 uppercase tracking-tighter">Marketing Hub</h1>
        <div class="space-y-4">
            <input id="mobileInput" type="number" placeholder="Mobile Number" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl px-5 py-4 text-center text-lg outline-none focus:border-blue-500 transition-all">
            <button id="loginBtn" onclick="checkStatus()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-2xl font-black shadow-lg transition-all active:scale-95">LOGIN</button>
        </div>
        <p class="mt-8 text-sm text-gray-400 font-bold uppercase tracking-widest">
            New Member? <br> <a href="javascript:void(0)" onclick="showReg()" class="text-blue-400 text-lg underline italic">Register Now</a>
        </p>
    </div>

    <div id="regPage" class="hidden-section max-w-md w-full bg-slate-800 rounded-[2.5rem] p-8 shadow-2xl border border-slate-700">
        <h2 class="text-xl font-black text-center mb-6 text-blue-500 uppercase italic">Create Account</h2>
        <div class="space-y-4">
            <input id="regName" type="text" placeholder="Full Name" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500">
            <input id="regMobile" type="number" placeholder="Mobile Number" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500">
            <select id="regLevel" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl px-4 py-3 outline-none text-gray-400">
                <option value="100">Plan ₹100</option>
                <option value="200">Plan ₹200</option>
                <option value="500">Plan ₹500</option>
                <option value="1000">Plan ₹1000</option>
                <option value="2000">Plan ₹2000</option>
            </select>
            <button id="regBtn" onclick="submitReg()" class="w-full bg-green-600 py-4 rounded-xl font-black uppercase shadow-lg active:scale-95 transition-all">Submit Details</button>
            <button onclick="showLogin()" class="w-full text-gray-500 text-[10px] font-bold uppercase py-2 tracking-widest">Back to Login</button>
        </div>
    </div>

    <div id="dashboardPage" class="hidden-section max-w-md w-full bg-slate-800 rounded-[2.5rem] p-6 shadow-2xl border border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p id="userName" class="text-[10px] text-blue-300 font-bold italic uppercase tracking-widest">---</p>
                <h2 class="text-xl font-black text-blue-500 italic uppercase">Your Dashboard</h2>
            </div>
            <button onclick="location.reload()" class="bg-slate-700 p-2 rounded-xl text-red-400 font-bold text-[10px]">LOGOUT</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Total Earning</p>
                <p id="resTotal" class="text-2xl font-black text-green-400 italic">₹0</p>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 text-center">
                <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Active Level</p>
                <p id="activeLvlDisplay" class="text-2xl font-black text-blue-400 italic">₹0</p>
            </div>
        </div>

        <div id="boxesContainer" class="grid grid-cols-5 gap-2"></div>
    </div>

    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxkaqO4cP3M8R9mLuC10JZHszVOqKPAL0jDFugCEbCivUu8xYbdzjx1ZpaKWiVXOccD0w/exec";
        
        function showReg() { 
            document.getElementById('loginPage').classList.add('hidden-section'); 
            document.getElementById('regPage').classList.remove('hidden-section'); 
        }
        function showLogin() { 
            document.getElementById('regPage').classList.add('hidden-section'); 
            document.getElementById('loginPage').classList.remove('hidden-section'); 
        }

        function submitReg() {
            const name = document.getElementById('regName').value;
            const mobile = document.getElementById('regMobile').value;
            const level = document.getElementById('regLevel').value;
            if(!name || !mobile) return alert("Please fill all details!");

            document.getElementById('regBtn').innerText = "Sending...";
            fetch(webAppUrl, { method: "POST", body: JSON.stringify({name, mobile, level}) })
            .then(() => {
                alert("Registration Successful! Admin will activate your account after payment.");
                showLogin();
                document.getElementById('regBtn').innerText = "Submit Details";
            });
        }

        function checkStatus() {
            const mobile = document.getElementById('mobileInput').value;
            if(!mobile) return alert("Enter Mobile Number!");
            
            document.getElementById('loginBtn').innerText = "Verifying...";
            fetch(webAppUrl + "?mobile=" + mobile)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    updateDashboard(data);
                    document.getElementById('loginPage').classList.add('hidden-section');
                    document.getElementById('dashboardPage').classList.remove('hidden-section');
                } else {
                    alert("Account not found or not active!");
                }
                document.getElementById('loginBtn').innerText = "LOGIN";
            })
            .catch(err => {
                alert("Connection error! Please try again.");
                document.getElementById('loginBtn').innerText = "LOGIN";
            });
        }

        function updateDashboard(data) {
            document.getElementById('userName').innerText = data.name;
            document.getElementById('activeLvlDisplay').innerText = "₹" + data.activeLevel;
            let totalEarn = 0;
            let html = "";
            
            [100, 200, 500, 1000, 2000].forEach(lvl => {
                const count = parseInt(data['count' + lvl]) || 0;
                let activeClass = (data.activeLevel == lvl) ? 'box-active' : 'box-locked';
                
                // Simple calculation: 20% commission per join
                totalEarn += (lvl * 0.20 * count);

                html += `
                <div class="p-2 rounded-2xl text-center min-h-[80px] flex flex-col justify-center transition-all ${activeClass}">
                    <p class="text-[8px] font-black text-gray-400 uppercase">LVL ${lvl}</p>
                    <p class="text-white font-black text-lg">${count}</p>
                    <p class="text-[6px] text-blue-400 font-bold uppercase tracking-widest">Joins</p>
                </div>`;
            });
            
            document.getElementById('boxesContainer').innerHTML = html;
            document.getElementById('resTotal').innerText = "₹" + Math.floor(totalEarn);
        }
    </script>
</body>
</html>
