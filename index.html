<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.S Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden-section { display: none !important; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen" onload="fetchStats()">

    <div id="authPage" class="max-w-md w-full space-y-6 mt-10">
        <div class="glass p-8 rounded-[2.5rem] text-center shadow-2xl">
            <h1 class="text-4xl font-black italic text-blue-500 mb-2 uppercase">P.S NETWORK</h1>
            
            <div class="grid grid-cols-2 gap-4 my-6">
                <div class="bg-slate-900/50 p-3 rounded-2xl border border-blue-500/20">
                    <p class="text-[9px] text-blue-400 font-bold uppercase">Total Joins</p>
                    <p id="statTotal" class="text-2xl font-black italic">--</p>
                </div>
                <div class="bg-slate-900/50 p-3 rounded-2xl border border-green-500/20">
                    <p class="text-[9px] text-green-400 font-bold uppercase">Today Join</p>
                    <p id="statDaily" class="text-2xl font-black italic">--</p>
                </div>
            </div>

            <div class="flex bg-slate-900 p-1 rounded-2xl mb-6">
                <button id="lBtn" onclick="toggle('login')" class="w-1/2 py-3 rounded-xl font-black text-xs bg-blue-600">LOGIN</button>
                <button id="rBtn" onclick="toggle('reg')" class="w-1/2 py-3 rounded-xl font-black text-xs text-gray-500">REGISTER</button>
            </div>

            <div id="loginArea">
                <input id="loginMob" type="number" placeholder="Mobile Number" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mb-4 text-center outline-none">
                <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-black shadow-xl">LOGIN</button>
            </div>

            <div id="regArea" class="hidden-section space-y-3 text-left">
                <input id="regName" type="text" placeholder="Aapka Naam" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                <input id="regMob" type="number" placeholder="Mobile Number" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 outline-none">
                <select id="regLvl" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3">
                    <option value="100">Plan ₹100</option>
                    <option value="200">Plan ₹200</option>
                    <option value="500">Plan ₹500</option>
                    <option value="1000">Plan ₹1000</option>
                    <option value="2000">Plan ₹2000</option>
                </select>
                <button onclick="handleReg()" class="w-full bg-green-600 py-4 rounded-xl font-black shadow-lg">JOIN NETWORK</button>
            </div>
        </div>
    </div>

    <div id="dashPage" class="hidden-section max-w-md w-full space-y-4">
        <div class="glass p-6 rounded-[2.5rem]">
            <div class="flex justify-between items-center mb-6">
                <h2 id="uNameDisplay" class="text-xl font-black uppercase italic">---</h2>
                <button onclick="location.reload()" class="bg-red-900 text-white text-[10px] px-3 py-1 rounded-lg">LOGOUT</button>
            </div>
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-700">
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Earnings</p>
                    <p id="uEarn" class="text-2xl font-black text-green-400 italic">₹0</p>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-700">
                    <p class="text-[8px] text-gray-500 uppercase font-bold">Plan</p>
                    <p id="uLvlDisplay" class="text-2xl font-black text-blue-400 italic">₹0</p>
                </div>
            </div>
            <div id="boxGrid" class="grid grid-cols-5 gap-2"></div>
        </div>
        <div id="teamList" class="space-y-2"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwtv_tbiSFhEydwwThdpF75WO-U5luXKlhXZo6_eStR-lMFIn0OHVJQ4kC_RMWkfg_rjg/exec";

        function fetchStats() {
            fetch(API_URL + "?getStats=true").then(r => r.json()).then(d => {
                document.getElementById('statTotal').innerText = d.totalJoins;
                document.getElementById('statDaily').innerText = d.dailyJoins;
            }).catch(e => console.log("Stats error"));
        }

        function toggle(m) {
            const isL = m === 'login';
            document.getElementById('loginArea').classList.toggle('hidden-section', !isL);
            document.getElementById('regArea').classList.toggle('hidden-section', isL);
            document.getElementById('lBtn').className = isL ? 'w-1/2 py-3 rounded-xl font-black text-xs bg-blue-600' : 'w-1/2 py-3 rounded-xl font-black text-xs text-gray-500';
            document.getElementById('rBtn').className = !isL ? 'w-1/2 py-3 rounded-xl font-black text-xs bg-blue-600' : 'w-1/2 py-3 rounded-xl font-black text-xs text-gray-500';
        }

        function handleLogin() {
            const mob = document.getElementById('loginMob').value;
            fetch(API_URL + "?mobile=" + mob).then(r => r.json()).then(d => {
                if(d.status === "success") {
                    document.getElementById('authPage').classList.add('hidden-section');
                    document.getElementById('dashPage').classList.remove('hidden-section');
                    renderDashboard(d);
                } else { alert("ID Not Found or Still Pending!"); }
            });
        }

        function renderDashboard(d) {
            document.getElementById('uNameDisplay').innerText = d.name;
            document.getElementById('uLvlDisplay').innerText = "₹" + d.activeLevel;
            let earn = 0, html = "", list = "";
            const conf = {100:0.15, 200:0.20, 500:0.25, 1000:0.30, 2000:0.35};

            [100, 200, 500, 1000, 2000].forEach(l => {
                const c = parseInt(d['count' + l]) || 0;
                let lock = l > parseInt(d.activeLevel);
                let e = (c>=1?l*(conf[l]+0.05):0)+(c>=2?l*(conf[l]+0.1):0)+(c>=3?l*(conf[l]+0.15):0)+(c>3?(c-3)*l*conf[l]:0);
                earn += e;
                html += `<div class="p-2 rounded-xl text-center border ${lock ? 'opacity-20 border-slate-700' : 'border-blue-500 bg-slate-800'}"><p class="text-[7px] text-gray-500">₹${l}</p><p class="text-lg font-black">${c}</p></div>`;
                for(let i=0; i<c; i++) list += `<div class="bg-slate-800 p-4 rounded-2xl border-l-4 border-blue-500 text-[10px] font-bold uppercase">Member Joined (₹${l})</div>`;
            });
            document.getElementById('boxGrid').innerHTML = html;
            document.getElementById('uEarn').innerText = "₹" + Math.floor(earn);
            document.getElementById('teamList').innerHTML = list || "<p class='text-center text-gray-600 text-xs mt-10'>TEAM KHali HAI</p>";
        }

        function handleReg() {
            const n = document.getElementById('regName').value, m = document.getElementById('regMob').value, l = document.getElementById('regLvl').value;
            if(!n || !m) return alert("Poora form bharo!");
            fetch(API_URL, { method: "POST", body: JSON.stringify({name: n, mobile: m, level: l}) })
            .then(() => { alert("Registration Done! Admin will active soon."); location.reload(); });
        }
    </script>
</body>
</html>
