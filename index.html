<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; }
        .box-locked { border: 2px solid #334155; background: #1e293b; opacity: 0.6; transition: all 0.3s; }
        .box-active { border: 2px solid #3b82f6; background: #1e293b; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); opacity: 1; }
        .bonus-glow { animation: pulse 2s infinite; border-color: #fbbf24 !important; box-shadow: 0 0 25px rgba(251, 191, 36, 0.5) !important; opacity: 1; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-slate-800 rounded-[2.5rem] p-8 shadow-2xl border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black italic tracking-tighter text-blue-500 uppercase">Marketing Hub</h1>
            <p class="text-gray-400 text-[10px] mt-1 uppercase tracking-[0.2em]">Welcome: <span id="userName" class="text-blue-300 font-bold italic">User</span></p>
        </div>

        <div class="relative mb-8">
            <input id="mobileInput" type="number" placeholder="Mobile Number Daalein" 
                   class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500 transition-all">
            <button onclick="checkStatus()" 
                    class="absolute right-2 top-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-black text-xs transition-all shadow-lg active:scale-95">
                CHECK
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8 text-center">
            <div class="bg-slate-900/50 p-5 rounded-3xl border border-slate-700/50">
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-1">Kul Kamayi</p>
                <p id="resTotal" class="text-3xl font-black text-green-400 italic">₹0</p>
            </div>
            <div class="bg-slate-900/50 p-5 rounded-3xl border border-slate-700/50">
                <p class="text-gray-500 text-[10px] uppercase font-bold tracking-widest mb-1">Active Level</p>
                <p id="activeLvlDisplay" class="text-3xl font-black text-blue-400 italic">₹--</p>
            </div>
        </div>

        <h3 class="text-[10px] font-black text-gray-500 mb-4 uppercase tracking-[0.2em] text-center italic">Referral Progress & Bonuses</h3>
        <div class="grid grid-cols-5 gap-2 mb-8">
            <script>
                const lvls = ["100", "200", "500", "1000", "2000"];
                lvls.forEach(l => {
                    document.write(`
                        <div id="lvl${l}" class="box-locked p-2 rounded-2xl text-center flex flex-col justify-between min-h-[115px] relative">
                            <div id="bonus${l}" class="hidden absolute -top-3 left-0 right-0 bg-gradient-to-r from-yellow-400 to-orange-500 text-black text-[7px] font-black py-1 rounded-full shadow-lg z-10 animate-bounce uppercase">Bonus!</div>
                            <p class="text-[8px] font-black text-gray-500">LVL ${l}</p>
                            <p id="c${l}" class="text-white font-black text-[11px] my-1">0</p>
                            <div class="mt-auto">
                                <p class="text-[7px] font-black text-blue-400 mb-1"><span id="p${l}">0</span>%</p>
                                <div class="w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                    <div id="bar${l}" class="bg-blue-500 h-full transition-all duration-700" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20 text-center">
            <p class="text-[9px] text-blue-300 font-medium italic uppercase tracking-wider">
                *Includes 15-35% Base + 5-15% Early Bird + Target Bonuses
            </p>
            <p class="text-[8px] text-gray-500 mt-2 font-bold uppercase">
                Payment ke liye Dashboard ka screenshot Admin ko bhejein
            </p>
        </div>
    </div>

    <script>
        const appConfig = {
            "100":  { target: 10, bonus: 200, base: 0.15 },
            "200":  { target: 15, bonus: 400, base: 0.20 },
            "500":  { target: 20, bonus: 600, base: 0.25 },
            "1000": { target: 25, bonus: 800, base: 0.30 },
            "2000": { target: 30, bonus: 1000, base: 0.35 }
        };

        const webAppUrl = "https://script.google.com/macros/s/AKfycbzuhWIWz2UKi1H-esj7RB_UYmaDpE-wDdH2YhO4tOCLPy0CL3mb72IXKP0t0W-uqtiNxg/exec";

        function checkStatus() {
            const mobile = document.getElementById('mobileInput').value;
            if(!mobile) return alert("Pehle Mobile Number daalein!");

            document.getElementById('userName').innerText = "Loading...";

            fetch(webAppUrl + "?mobile=" + mobile)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    updateDashboard(data);
                } else {
                    alert("Record Nahi Mila! Details check karein.");
                    document.getElementById('userName').innerText = "Member";
                }
            })
            .catch(err => alert("Server connection error!"));
        }

        function updateDashboard(data) {
            document.getElementById('userName').innerText = data.name;
            document.getElementById('activeLvlDisplay').innerText = "₹" + data.activeLevel;
            
            let totalEarnings = 0;

            Object.keys(appConfig).forEach(lvl => {
                const count = parseInt(data['count' + lvl]) || 0;
                const cfg = appConfig[lvl];
                
                // --- CALCULATION LOGIC ---
                let levelIncome = 0;
                for(let i=1; i<=count; i++) {
                    let rate = cfg.base; // Flat Rate (15% to 35%)
                    if(i === 1) rate += 0.05; // Extra 5% for first
                    if(i === 2) rate += 0.10; // Extra 10% for second
                    if(i === 3) rate += 0.15; // Extra 15% for third
                    levelIncome += (parseInt(lvl) * rate);
                }

                // --- BONUS & UI UPDATES ---
                let percent = (count / cfg.target) * 100;
                const box = document.getElementById('lvl' + lvl);
                const badge = document.getElementById('bonus' + lvl);
                
                // Reset State
                box.className = "box-locked p-2 rounded-2xl text-center flex flex-col justify-between min-h-[115px] relative";
                badge.classList.add('hidden');

                if(percent >= 100) {
                    percent = 100;
                    levelIncome += cfg.bonus; // Target Bonus
                    badge.classList.remove('hidden');
                    box.classList.add('bonus-glow');
                } else if(data.activeLevel == lvl) {
                    box.classList.add('box-active');
                }

                totalEarnings += levelIncome;

                // Sync with UI
                document.getElementById('c' + lvl).innerText = count;
                document.getElementById('p' + lvl).innerText = Math.round(percent);
                document.getElementById('bar' + lvl).style.width = percent + "%";
            });

            document.getElementById('resTotal').innerText = "₹" + Math.floor(totalEarnings);
        }
    </script>
</body>
</html>
