<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub | Punit Kumar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #f3f4f6; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="pb-10">

    <div class="gradient-bg text-white pt-10 pb-20 px-6 text-center rounded-b-[3rem] shadow-2xl">
        <h1 class="text-3xl font-extrabold tracking-tight">MARKETING HUB</h1>
        <p class="text-blue-100 text-sm mt-2 opacity-80 italic flex items-center justify-center">
            <i class="fas fa-user-shield mr-2"></i> Designed by Civil Engineer Punit Kumar
        </p>
    </div>

    <div class="max-w-md mx-auto -mt-12 px-4">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-3xl shadow-xl text-center border-b-4 border-blue-600">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Total Members</p>
                <p id="totalCounter" class="text-3xl font-black text-blue-900 mt-1">0</p>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-xl text-center border-b-4 border-green-500 relative">
                <span class="absolute top-3 right-3 flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                <p class="text-[10px] text-gray-400 font-bold uppercase">Today Joined</p>
                <p id="dailyCounter" class="text-3xl font-black text-green-600 mt-1">0</p>
            </div>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-8 px-6">
        <div class="bg-white rounded-3xl p-8 shadow-lg border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                <i class="fas fa-pen-nib text-blue-600 mr-3"></i> Naya Registration
            </h2>
            
            <form id="registrationForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Aapka Naam</label>
                    <input type="text" name="name" required placeholder="Full Name likhein" 
                        class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Mobile Number</label>
                    <input type="number" name="mobile" required placeholder="WhatsApp Number" 
                        class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Referral Code</label>
                    <input type="text" name="referral" placeholder="Nahi hai toh khali chhodein" 
                        class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center">
                    <span>JOIN NOW (₹100)</span>
                    <i class="fas fa-arrow-right ml-2"></i>
                </button>
            </form>
        </div>
    </div>

    <div class="max-w-md mx-auto mt-6 px-6 text-center">
        <p class="text-xs text-gray-400 leading-relaxed">
            <i class="fas fa-info-circle mr-1"></i> Registration ke baad payment screenshot WhatsApp par bhejein.<br>
            Aapka data 100% surakshis aur transparent hai.
        </p>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx6wDDz4R8DeyWlHg2xYLWvZ1ADz9Q2PtiJsbooF7tXtMBcSUbpZAzvV7tO33ABE8l79Q/exec';
        const form = document.getElementById('registrationForm');
        const submitBtn = document.getElementById('submitBtn');

        // Dashboard refresh karne ka function
        function refreshDashboard() {
            fetch(scriptURL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('totalCounter').innerText = data.total || 0;
                document.getElementById('dailyCounter').innerText = data.daily || 0;
            })
            .catch(err => console.error("Error loading dashboard"));
        }

        // Form Submit hone par action
        form.addEventListener('submit', e => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Processing...';

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("Registration Successful! Ab payment screenshot WhatsApp karein.");
                form.reset();
                submitBtn.disabled = false;
                submitBtn.innerText = 'JOIN NOW (₹100)';
                refreshDashboard(); // Counter update karein
            })
            .catch(error => {
                alert("Error! Please try again.");
                submitBtn.disabled = false;
                submitBtn.innerText = 'JOIN NOW (₹100)';
            });
        });

        // Load dashboard on start
        window.onload = refreshDashboard;
        // Refresh every 60 seconds
        setInterval(refreshDashboard, 60000);
    </script>
</body>
</html>
